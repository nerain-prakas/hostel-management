<div class="login-container">
    <div class="login-card" id="login-form-container">
        <div class="brand-header">
            <h1 class="brand-logo">AttendMS</h1>
            <p class="brand-tagline">Smart Attendance. Simplified.</p>
        </div>

        <form id="login-form" novalidate>
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@institution.edu" required>
                <div id="email-error" class="error-text"></div>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <div class="password-field">
                    <input type="password" id="password" placeholder="Enter your password" required>
                    <span class="password-toggle" id="toggle-password">👁</span>
                </div>
                <div id="password-error" class="error-text"></div>
            </div>

            <div class="remember-me">
                <input type="checkbox" id="remember-me">
                <label for="remember-me">Remember Me</label>
            </div>

            <a href="#" class="forgot-password" id="forgot-password-link">Forgot Password?</a>

            <button type="submit" id="login-btn" class="btn btn-primary" style="width: 100%;">
                <span id="btn-text">Login</span>
                <div id="btn-spinner" class="spinner" style="display: none;"></div>
            </button>
        </form>
    </div>
</div>

<div id="forgot-password-modal" class="modal-overlay" style="display: none;">
    <div class="modal-card">
        <h3>Reset Password</h3>
        <p class="muted mb-20">Enter your registered email to receive a reset link.</p>
        <div class="input-group">
            <input type="email" id="reset-email" placeholder="email@example.com">
            <div id="reset-email-error" class="error-text"></div>
        </div>
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
            <button class="btn" id="close-reset-modal">Cancel</button>
            <button class="btn btn-primary" id="submit-reset">Send Link</button>
        </div>
    </div>
</div>
