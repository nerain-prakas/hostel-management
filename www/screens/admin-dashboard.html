<!-- Admin Dashboard -->
<div class="page-header">
    <div class="header-top">
        <h2>Admin Console</h2>
    </div>
    <div class="breadcrumb">Home &gt; Dashboard</div>
</div>

<div class="content-area">
    <!-- System Stats Grid -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">👥</div>
            <div class="stat-info">
                <span class="label">Total Students</span>
                <span class="value" id="stat-students">0</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🎓</div>
            <div class="stat-info">
                <span class="label">Total Faculty</span>
                <span class="value" id="stat-faculty">0</span>
            </div>
        </div>
        <div class="stat-card highlight">
            <div class="stat-icon">📈</div>
            <div class="stat-info">
                <span class="label">Today's Avg %</span>
                <span class="value" id="stat-today-percent">0%</span>
            </div>
        </div>
        <div class="stat-card alert">
            <div class="stat-icon">⚠️</div>
            <div class="stat-info">
                <span class="label">Below 75%</span>
                <span class="value" id="stat-shortage">0</span>
            </div>
        </div>
    </div>

    <!-- Admin Quick Links -->
    <div class="section-title">Management</div>
    <div class="admin-actions-grid">
        <a href="#admin-manage-users" class="action-card">
            <div class="action-icon">👤</div>
            <div class="action-text">Manage Users</div>
        </a>
        <a href="#admin-settings" class="action-card">
            <div class="action-icon">⚙️</div>
            <div class="action-text">App Settings</div>
        </a>
    </div>
</div>

<nav class="bottom-nav">
    <a href="#admin-dashboard" class="nav-item active">
        <i class="icon">🏠</i>
        <span>Home</span>
    </a>
    <a href="#admin-manage-users" class="nav-item">
        <i class="icon">👤</i>
        <span>Users</span>
    </a>
    <a href="#admin-settings" class="nav-item">
        <i class="icon">⚙️</i>
        <span>Settings</span>
    </a>
</nav>
